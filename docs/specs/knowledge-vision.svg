<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 840" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1628"/>
      <stop offset="1" stop-color="#0f2038"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16263f"/>
      <stop offset="1" stop-color="#11203a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f3a2e"/><stop offset="1" stop-color="#244534"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16323f"/><stop offset="1" stop-color="#1a3c4d"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a2e1c" /><stop offset="1" stop-color="#46371f"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9ef01a"/>
    </marker>
    <marker id="arrowC" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4cc9f0"/>
    </marker>
  </defs>

  <rect width="1280" height="840" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="64" fill="#ffffff" font-size="36" font-weight="700">Engineering Memory That Compounds</text>
  <text x="60" y="98" fill="#c8d6e5" font-size="18" fill-opacity="0.85">
    <tspan fill="#9ef01a">Every project</tspan><tspan fill="#c8d6e5"> makes the knowledge graph richer, so the </tspan><tspan fill="#4cc9f0" dx="3">next project starts smarter.</tspan>
  </text>

  <!-- INPUT: many codebases -->
  <text x="120" y="200" fill="#7d93ad" font-size="14" font-weight="700" letter-spacing="2">MANY CODEBASES</text>
  <g>
    <rect x="70" y="300" width="150" height="62" rx="10" fill="#1b2a41" stroke="#2c4a6e"/>
    <rect x="58" y="284" width="150" height="62" rx="10" fill="#1f314c" stroke="#34568a"/>
    <rect x="46" y="268" width="150" height="62" rx="10" fill="#243a5a" stroke="#3f63a0"/>
    <text x="121" y="304" fill="#dce6f5" font-size="16" font-weight="600" text-anchor="middle">Project A · B · C</text>
    <text x="121" y="324" fill="#7d93ad" font-size="13" text-anchor="middle">… N repos + docs</text>
  </g>
  <line x1="210" y1="300" x2="300" y2="300" stroke="#9ef01a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- CENTER PANEL: PKG + ontology, 3 layers -->
  <rect x="310" y="150" width="560" height="430" rx="18" fill="url(#panel)" stroke="#2c4a6e" stroke-width="1.5"/>
  <text x="338" y="186" fill="#ffffff" font-size="19" font-weight="700">Product Knowledge Graph &amp; Ontology</text>
  <text x="338" y="208" fill="#7d93ad" font-size="13">three layers — each governed, each differently trusted</text>

  <!-- Layer 3: drift governance -->
  <rect x="338" y="228" width="504" height="92" rx="12" fill="url(#amber)" stroke="#caa14a" stroke-width="1.3"/>
  <circle cx="364" cy="258" r="7" fill="#f0b429"/>
  <text x="382" y="256" fill="#f7d774" font-size="16" font-weight="700">③ Drift Governance — the immune system</text>
  <text x="382" y="278" fill="#d9c79a" font-size="13">infodrift watches for knowledge decay; demotes patterns that stop holding</text>
  <text x="382" y="298" fill="#b9a778" font-size="12" font-style="italic">grows in verified knowledge, never in noise</text>

  <!-- Layer 2: cross-project patterns -->
  <rect x="338" y="332" width="504" height="92" rx="12" fill="url(#cyan)" stroke="#3a8fb0" stroke-width="1.3"/>
  <circle cx="364" cy="362" r="7" fill="#4cc9f0"/>
  <text x="382" y="360" fill="#8fe3ff" font-size="16" font-weight="700">② Cross-Project Patterns — hypotheses</text>
  <text x="382" y="382" fill="#bfe6f2" font-size="13">recurring engineering wisdom that emerges across systems</text>
  <text x="382" y="402" fill="#86b9cc" font-size="12" font-style="italic">applicability-tagged · re-grounded locally before use · never gospel</text>

  <!-- Layer 1: grounded facts -->
  <rect x="338" y="436" width="504" height="92" rx="12" fill="url(#green)" stroke="#3f9d63" stroke-width="1.3"/>
  <circle cx="364" cy="466" r="7" fill="#9ef01a"/>
  <text x="382" y="464" fill="#c4f08a" font-size="16" font-weight="700">① Grounded Facts — always true</text>
  <text x="382" y="486" fill="#cdeab0" font-size="13">what this codebase actually is — entities, contracts, call graph</text>
  <text x="382" y="506" fill="#9bc47e" font-size="12" font-style="italic">line-level provenance · the bedrock</text>

  <!-- emergence arrows facts->patterns->governance -->
  <line x1="862" y1="482" x2="862" y2="378" stroke="#4cc9f0" stroke-width="2.5" marker-end="url(#arrowC)"/>
  <text x="876" y="436" fill="#7d93ad" font-size="11" transform="rotate(-90 876 436)">emerge</text>

  <!-- output -->
  <line x1="870" y1="300" x2="958" y2="300" stroke="#9ef01a" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="958" y="232" width="262" height="136" rx="16" fill="#15331f" stroke="#3f9d63" stroke-width="1.5"/>
  <text x="1089" y="282" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">Smarter,</text>
  <text x="1089" y="308" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">grounded generation</text>
  <text x="1089" y="338" fill="#9bc47e" font-size="13" text-anchor="middle">code that fits the system —</text>
  <text x="1089" y="356" fill="#9bc47e" font-size="13" text-anchor="middle">never an unverified guess</text>

  <!-- feedback loop -->
  <path d="M1089 372 C1089 470, 1089 640, 460 640 C 260 640, 150 560, 121 348"
        fill="none" stroke="#4cc9f0" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowC)"/>
  <rect x="470" y="618" width="360" height="44" rx="10" fill="#11203a" stroke="#3a8fb0"/>
  <text x="650" y="646" fill="#8fe3ff" font-size="15" font-weight="600" text-anchor="middle">every project makes the next one smarter</text>

  <!-- 4 roles legend -->
  <text x="60" y="730" fill="#7d93ad" font-size="14" font-weight="700" letter-spacing="2">FOUR ROLES</text>
  <g font-size="14">
    <rect x="60" y="746" width="280" height="64" rx="10" fill="#16263f" stroke="#2c4a6e"/>
    <circle cx="86" cy="772" r="7" fill="#c084fc"/>
    <text x="104" y="772" fill="#e7d6ff" font-weight="700">Brain — Cognitive Extractor</text>
    <text x="104" y="792" fill="#9a86c4" font-size="12">grounded instances → patterns · TO BUILD</text>

    <rect x="356" y="746" width="280" height="64" rx="10" fill="#16263f" stroke="#2c4a6e"/>
    <circle cx="382" cy="772" r="7" fill="#9ef01a"/>
    <text x="400" y="772" fill="#c4f08a" font-weight="700">Memory — ontomesh</text>
    <text x="400" y="792" fill="#9bc47e" font-size="12">ontology · graph · retrieval</text>

    <rect x="652" y="746" width="280" height="64" rx="10" fill="#16263f" stroke="#2c4a6e"/>
    <circle cx="678" cy="772" r="7" fill="#f0b429"/>
    <text x="696" y="772" fill="#f7d774" font-weight="700">Immune system — infodrift</text>
    <text x="696" y="792" fill="#b9a778" font-size="12">detects knowledge decay</text>

    <rect x="948" y="746" width="272" height="64" rx="10" fill="#16263f" stroke="#2c4a6e"/>
    <circle cx="974" cy="772" r="7" fill="#4cc9f0"/>
    <text x="992" y="772" fill="#8fe3ff" font-weight="700">Hands — orchestrator</text>
    <text x="992" y="792" fill="#86b9cc" font-size="12">does the work · gates it</text>
  </g>
</svg>
