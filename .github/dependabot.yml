version: 2

updates:
  # Python dependencies. uv.lock is the source of truth; Dependabot reads the
  # pyproject/lock pair and opens bumps against `develop` (never `main` — see
  # CONTRIBUTING.md; main only receives release PRs).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # One PR per weekly batch for routine bumps, so the queue stays readable.
      # Security fixes are deliberately NOT grouped — each lands on its own so it
      # can be reviewed and merged without waiting on unrelated upgrades.
      dev-dependencies:
        dependency-type: "development"
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # Pinned action SHAs/tags go stale silently and are a supply-chain surface.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    commit-message:
      prefix: "chore(ci)"
    groups:
      # ONE PR for all action bumps. Without this, Dependabot splits related actions
      # into separate PRs — notably codeql-action/init and codeql-action/analyze, which
      # MUST move together (an init on vN emits a config a vN-1 analyze rejects,
      # failing CI). Grouping keeps interdependent actions in lockstep.
      github-actions:
        patterns: ["*"]
