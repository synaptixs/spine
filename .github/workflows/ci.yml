name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # JDK for the Java-codegen integration tests (Maven is pre-installed on the
      # runner). The tests skip cleanly when the toolchain is absent.
      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      # Node for the TypeScript-codegen integration tests (npm comes with Node).
      # The tests skip cleanly when the toolchain is absent.
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"

      - name: Install project
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      # README.md is the PyPI project page. PyPI serves it from pypi.org, so any
      # relative link/image 404s there — every reference must be an absolute URL.
      - name: README links absolute (relative paths 404 on PyPI)
        run: |
          fail=0
          if grep -nP '\]\((?!https?://|#|mailto:)[^)]+\)' README.md; then
            echo "::error file=README.md::Relative markdown link(s) above — use absolute https:// URLs (they 404 on PyPI)."
            fail=1
          fi
          if grep -nP 'src="(?!https?://)[^"]+"' README.md; then
            echo "::error file=README.md::Relative image src above — use an absolute raw.githubusercontent.com URL."
            fail=1
          fi
          [ "$fail" -eq 0 ] && echo "README link check passed."
          exit $fail

      - name: Type check (mypy)
        run: uv run mypy

      - name: Tests
        run: uv run pytest
