<svg width="100%" viewBox="0 0 1280 640" role="img" xmlns="http://www.w3.org/2000/svg"><title>Spine — Product Knowledge Graph</title><desc>The Product Knowledge Graph: a code-native graph of modules, types, functions, fields, endpoints, and entities.</desc>
<rect x="0" y="0" width="1280" height="640" fill="#0B1020"/>
<rect x="0" y="0" width="1280" height="6" fill="#2DD4BF"/>
<text x="90" y="170" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" letter-spacing="3" fill="#5DCAA5">PRODUCT KNOWLEDGE GRAPH</text>
<text x="86" y="288" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="700" fill="#F5F7FA">Knowledge Graph</text>
<text x="90" y="346" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="500" fill="#C9D2E0">Spine understands your codebase —</text>
<text x="90" y="382" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="500" fill="#C9D2E0">code-native, not guessed.</text>
<text x="90" y="436" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="400" fill="#9AA4B2">Modules · types · functions · calls · blast radius.</text>
<text x="90" y="520" font-family="ui-monospace, Menlo, monospace" font-size="22" font-weight="400" fill="#5DCAA5">pip install synaptixs-spine</text>
<text x="90" y="556" font-family="ui-monospace, Menlo, monospace" font-size="22" font-weight="400" fill="#8A94A6">orchestrator understand .</text>

